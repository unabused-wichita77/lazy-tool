name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate benchmark golden JSONL
        run: |
          python3 benchmark/scripts/test_benchmark_harness_semantics.py
          python3 benchmark/scripts/validate_benchmark_jsonl.py benchmark/golden/sample_benchmark_rows.jsonl
          python3 benchmark/scripts/check_golden_invariants.py benchmark/golden/sample_benchmark_rows.jsonl
          python3 benchmark/scripts/check_golden_tasks_vs_harness.py
          python3 benchmark/scripts/check_offline_benchmark_snapshot.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
